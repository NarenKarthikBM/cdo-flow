<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="al" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#f85149"/>
    </marker>
    <marker id="ar" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="360" fill="#0d1117"/>

  <!-- Title -->
  <text x="430" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#e6edf3">Manual CDO  vs  cdo-flow</text>

  <!-- ===== LEFT PANEL ===== -->
  <rect x="20" y="36" width="390" height="300" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- left accent strip -->
  <rect x="20" y="36" width="3" height="300" rx="1" fill="#f85149"/>

  <text x="215" y="57" text-anchor="middle" font-size="11" font-weight="bold" fill="#f85149" letter-spacing="1">MANUAL CDO</text>
  <line x1="30" y1="64" x2="402" y2="64" stroke="#21262d" stroke-width="1"/>

  <!-- cmd 1 -->
  <rect x="32" y="93" width="366" height="40" rx="5" fill="#1c0a0a" stroke="#f85149" stroke-width="1" stroke-opacity="0.5"/>
  <text x="215" y="117" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#e6edf3">$ cdo selname,tas  input.nc  tas.nc</text>

  <line x1="215" y1="133" x2="215" y2="149" stroke="#f85149" stroke-width="1.5" marker-end="url(#al)"/>

  <!-- cmd 2 -->
  <rect x="32" y="150" width="366" height="40" rx="5" fill="#1c0a0a" stroke="#f85149" stroke-width="1" stroke-opacity="0.5"/>
  <text x="215" y="174" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#e6edf3">$ cdo selyear,2000/2020  tas.nc  sub.nc</text>

  <line x1="215" y1="190" x2="215" y2="206" stroke="#f85149" stroke-width="1.5" marker-end="url(#al)"/>

  <!-- cmd 3 -->
  <rect x="32" y="207" width="366" height="40" rx="5" fill="#1c0a0a" stroke="#f85149" stroke-width="1" stroke-opacity="0.5"/>
  <text x="215" y="231" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#e6edf3">$ cdo yearmean  sub.nc  annual.nc</text>

  <line x1="215" y1="247" x2="215" y2="263" stroke="#f85149" stroke-width="1.5" marker-end="url(#al)"/>

  <!-- cmd 4 -->
  <rect x="32" y="264" width="366" height="40" rx="5" fill="#1c0a0a" stroke="#f85149" stroke-width="1" stroke-opacity="0.5"/>
  <text x="215" y="288" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#e6edf3">$ cdo remapbil,r360x180  annual.nc  out.nc</text>

  <!-- ===== RIGHT PANEL ===== -->
  <rect x="450" y="36" width="390" height="300" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- right accent strip -->
  <rect x="837" y="36" width="3" height="300" rx="1" fill="#3fb950"/>

  <text x="645" y="57" text-anchor="middle" font-size="11" font-weight="bold" fill="#3fb950" letter-spacing="1">CDO-FLOW</text>
  <line x1="462" y1="64" x2="832" y2="64" stroke="#21262d" stroke-width="1"/>

  <!-- input.nc -->
  <rect x="462" y="124" width="366" height="36" rx="5" fill="#1c2128" stroke="#484f58" stroke-width="1"/>
  <text x="645" y="147" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#8b949e">input.nc</text>

  <line x1="645" y1="160" x2="645" y2="178" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- cdo-flow run (highlighted) -->
  <rect x="462" y="180" width="366" height="40" rx="5" fill="#0a1c0f" stroke="#3fb950" stroke-width="1.5"/>
  <text x="645" y="204" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#e6edf3">$ cdo-flow run workflow.yml  -i data=input.nc</text>

  <line x1="645" y1="220" x2="645" y2="238" stroke="#3fb950" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- out.nc -->
  <rect x="462" y="240" width="366" height="36" rx="5" fill="#0d2318" stroke="#3fb950" stroke-width="1"/>
  <text x="645" y="263" text-anchor="middle" font-size="12" font-family="'Courier New', monospace" fill="#3fb950">out.nc</text>

  <!-- VS -->
  <circle cx="435" cy="186" r="18" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="435" y="191" text-anchor="middle" font-size="11" font-weight="bold" fill="#8b949e">vs</text>
</svg>
